<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#0F172A" />
  
  <!-- Hero Card -->
  <rect x="60" y="60" width="1160" height="600" rx="20" fill="#1E293B" />
  
  <!-- Accent bar -->
  <rect x="60" y="60" width="8" height="600" rx="4" fill="#3B82F6" />
  
  <!-- Title -->
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#F8FAFC">AI 驱动的 SVG 转 PPT 方案</text>
  
  <!-- Subtitle -->
  <text x="120" y="210" font-family="Arial, sans-serif" font-size="24" fill="#94A3B8">Prompt → SVG → Editable PPTX · 全矢量 · 可编辑</text>
  
  <!-- Divider -->
  <line x1="120" y1="240" x2="1160" y2="240" stroke="#334155" stroke-width="2" />
  
  <!-- Feature cards row -->
  <rect x="120" y="280" width="340" height="160" rx="12" fill="#334155" />
  <text x="160" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#60A5FA">01 · SVG 生成</text>
  <text x="160" y="365" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">AI 根据 Prompt 直接生成</text>
  <text x="160" y="395" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">结构化 SVG 幻灯片</text>
  
  <rect x="490" y="280" width="340" height="160" rx="12" fill="#334155" />
  <text x="530" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#34D399">02 · 矢量转换</text>
  <text x="530" y="365" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">SVG 元素 1:1 映射为</text>
  <text x="530" y="395" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">PPTX 原生形状</text>
  
  <rect x="860" y="280" width="340" height="160" rx="12" fill="#334155" />
  <text x="900" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F472B6">03 · 完全可编辑</text>
  <text x="900" y="365" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">在 PowerPoint 中每个</text>
  <text x="900" y="395" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">元素都可独立修改</text>
  
  <!-- Bottom stats -->
  <rect x="120" y="480" width="200" height="100" rx="8" fill="#1E3A5F" />
  <text x="160" y="520" font-family="Arial, sans-serif" font-size="14" fill="#64748B">支持元素</text>
  <text x="160" y="555" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">8 种</text>
  
  <rect x="350" y="480" width="200" height="100" rx="8" fill="#1E3A5F" />
  <text x="390" y="520" font-family="Arial, sans-serif" font-size="14" fill="#64748B">转换模式</text>
  <text x="390" y="555" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">矢量</text>
  
  <rect x="580" y="480" width="200" height="100" rx="8" fill="#1E3A5F" />
  <text x="620" y="520" font-family="Arial, sans-serif" font-size="14" fill="#64748B">可编辑性</text>
  <text x="620" y="555" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">100%</text>
  
  <!-- Decorative circle -->
  <circle cx="1100" cy="530" r="60" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3" />
  <circle cx="1100" cy="530" r="40" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.2" />
  
  <!-- Footer -->
  <text x="120" y="640" font-family="Arial, sans-serif" font-size="14" fill="#475569">svg-to-ppt-skill · Phase 1 Demo</text>
  <text x="1160" y="640" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="end">2026</text>
</svg>
