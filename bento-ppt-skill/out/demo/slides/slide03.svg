<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><rect width="1280" height="720" fill="#F8FAFC"/><rect x="40" y="32" width="1200" height="656" rx="30" fill="#F8FAFC" stroke="#E2E8F0"/><text x="72" y="68" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#4F46E5" font-weight="700">PART 01</text><text x="1180" y="68" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#64748B" font-weight="700">01</text><line x1="72" y1="88" x2="1208" y2="88" stroke="#E2E8F0"/><text x="72" y="138" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="34" fill="#0F172A" font-weight="800">旧流程的瓶颈不在执行</text><text x="72" y="170" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="18" fill="#64748B" font-weight="500">真正拖慢团队的，是协作断点与上下文丢失。</text><rect x="72" y="210" width="562" height="225" rx="22" fill="#FFFFFF" stroke="#A5B4FC"/><rect x="88" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">MAIN</text><text x="88" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="20" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">核心判断</tspan></text><text x="88" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 执行工具已经很多，但协作上下文仍然断裂。</tspan></text><text x="88" y="315.6" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 团队花大量时间在同步，而不是推进。</tspan></text><text x="88" y="337.20000000000005" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 真正的问题是流程没有统一编排层。</tspan></text><rect x="646" y="210" width="562" height="225" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="660" y="224" width="534" height="30" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="674" y="252" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="14" fill="#0F172A" font-weight="700"><tspan x="674" dy="0">断点一</tspan></text><rect x="660" y="266" width="534" height="155" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="674" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="674" dy="0">没有人持续维护跨工具的逻辑闭环。</tspan></text><rect x="72" y="447" width="418" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="88" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">COST</text><text x="88" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">时间成本</tspan></text><text x="88" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 重复同步吞掉真正可用于思考和产出的时间。</tspan></text><rect x="502" y="447" width="347" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="518" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="532" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">RISK</text><text x="518" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="518" dy="0">团队风险</tspan></text><text x="518" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="518" dy="0">• 流程过度依赖个人记忆和隐性经验。</tspan></text><rect x="861" y="447" width="347" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="877" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="891" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">ACT</text><text x="877" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="877" dy="0">转向建议</tspan></text><text x="877" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="877" dy="0">• 先统一结构，再谈工具集成。</tspan></text></svg>