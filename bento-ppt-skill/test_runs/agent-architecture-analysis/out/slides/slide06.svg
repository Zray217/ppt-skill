<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><rect width="1280" height="720" fill="#F8FAFC"/><rect x="40" y="32" width="1200" height="656" rx="30" fill="#F8FAFC" stroke="#E2E8F0"/><text x="72" y="68" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#4F46E5" font-weight="700">PART 02</text><text x="1180" y="68" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#64748B" font-weight="700">03</text><line x1="72" y1="88" x2="1208" y2="88" stroke="#E2E8F0"/><text x="72" y="138" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="34" fill="#0F172A" font-weight="800">ReAct 适合短链路强反馈</text><text x="72" y="170" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="18" fill="#64748B" font-weight="500">它的优势在于边想边做，但它不是长程组织的全部答案。</text><rect x="72" y="210" width="706" height="225" rx="22" fill="#FFFFFF" stroke="#A5B4FC"/><rect x="88" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">MAIN</text><text x="88" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="20" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">ReAct 核心</tspan></text><text x="88" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 观察、推理、行动形成高反馈闭环。</tspan></text><text x="88" y="315.6" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 适合可以快速试探和修正的任务。</tspan></text><text x="88" y="337.20000000000005" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 它的灵活性来自短链路而不是全局规划。</tspan></text><rect x="790" y="210" width="418" height="225" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="806" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="820" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">PLUS</text><text x="806" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="806" dy="0">优势</tspan></text><text x="806" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="806" dy="0">• 低延迟、适应性强、对环境变化反应快。</tspan></text><rect x="72" y="447" width="562" height="83" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="88" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">R1</text><text x="88" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">风险一</tspan></text><text x="88" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 长任务中容易忘记阶段目标。</tspan></text><rect x="646" y="447" width="562" height="83" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="662" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="676" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">R2</text><text x="662" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="662" dy="0">风险二</tspan></text><text x="662" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="662" dy="0">• 多工具执行时更容易局部最优。</tspan></text><rect x="72" y="541" width="1136" height="83" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="88" y="555" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="571" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">BAR</text><text x="88" y="597" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="18" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">一句话</tspan></text></svg>