<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><rect width="1280" height="720" fill="#F8FAFC"/><rect x="40" y="32" width="1200" height="656" rx="30" fill="#F8FAFC" stroke="#E2E8F0"/><text x="72" y="68" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#4F46E5" font-weight="700">PART 01</text><text x="1180" y="68" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#64748B" font-weight="700">02</text><line x1="72" y1="88" x2="1208" y2="88" stroke="#E2E8F0"/><text x="72" y="138" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="34" fill="#0F172A" font-weight="800">单环代理与分层代理的差异</text><text x="72" y="170" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="18" fill="#64748B" font-weight="500">前者快，但容易漂；后者稳，但需要更强的组织层。</text><rect x="72" y="210" width="562" height="225" rx="22" fill="#FFFFFF" stroke="#A5B4FC"/><rect x="88" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">LOOP</text><text x="88" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="20" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">单环代理</tspan></text><text x="88" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 观察、思考、行动都塞在同一循环里。</tspan></text><rect x="646" y="210" width="562" height="225" rx="22" fill="#FFFFFF" stroke="#A5B4FC"/><rect x="662" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="676" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">STACK</text><text x="662" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="20" fill="#0F172A" font-weight="700"><tspan x="662" dy="0">分层代理</tspan></text><text x="662" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="662" dy="0">• 把规划、执行和底层控制拆成不同职责。</tspan></text><rect x="72" y="447" width="562" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="88" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">DETAIL</text><text x="88" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">核心差异</tspan></text><text x="88" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 真正的差别不在模型，而在结构是否可控。</tspan></text><rect x="646" y="447" width="275" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="662" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="676" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">LAT</text><text x="662" y="509" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="28" fill="#0F172A" font-weight="800"><tspan x="662" dy="0">低</tspan></text><text x="662" y="547" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="662" dy="0">延迟</tspan></text><text x="662" y="565" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#64748B" font-weight="500"><tspan x="662" dy="0">单环路径更短，响应更快。</tspan></text><rect x="933" y="447" width="275" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="949" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="963" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">CONS</text><text x="949" y="509" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="28" fill="#0F172A" font-weight="800"><tspan x="949" dy="0">高</tspan></text><text x="949" y="547" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="949" dy="0">一致性</tspan></text><text x="949" y="565" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#64748B" font-weight="500"><tspan x="949" dy="0">分层结构更容易维持全局目</tspan></text></svg>