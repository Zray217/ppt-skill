<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><rect width="1280" height="720" fill="#F8FAFC"/><rect x="40" y="32" width="1200" height="656" rx="30" fill="#F8FAFC" stroke="#E2E8F0"/><text x="72" y="68" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#4F46E5" font-weight="700">PART 02</text><text x="1180" y="68" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#64748B" font-weight="700">04</text><line x1="72" y1="88" x2="1208" y2="88" stroke="#E2E8F0"/><text x="72" y="138" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="34" fill="#0F172A" font-weight="800">P&amp;E 把全局规划显式拆开</text><text x="72" y="170" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="18" fill="#64748B" font-weight="500">Planner 决定怎么走，Executor 决定每一步怎么做。</text><rect x="72" y="210" width="706" height="225" rx="22" fill="#FFFFFF" stroke="#A5B4FC"/><rect x="88" y="224" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="240" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">MAIN</text><text x="88" y="264" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="20" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">P&amp;E 结构</tspan></text><text x="88" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 先规划，再执行，让系统拥有显式的全局结构。</tspan></text><text x="88" y="315.6" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 适合目标明确但链路较长的任务。</tspan></text><text x="88" y="337.20000000000005" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 核心收益是可解释和可审计。</tspan></text><rect x="790" y="210" width="418" height="225" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="804" y="224" width="390" height="30" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="818" y="252" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="818" dy="0">Planner 先拆目标、排阶段、定依赖。</tspan></text><rect x="804" y="266" width="390" height="72" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="818" y="294" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="818" dy="0">Executor 逐步完成并回传结果。</tspan></text><rect x="804" y="349" width="390" height="72" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="818" y="377" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="818" dy="0">必要时重规划，而不是无止境自循环。</tspan></text><rect x="72" y="447" width="347" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="88" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="102" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">CASE</text><text x="88" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="88" dy="0">优势</tspan></text><text x="88" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="88" dy="0">• 适合方案生成、代码改造、跨文件任务。</tspan></text><rect x="431" y="447" width="347" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="447" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="461" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">NEXT</text><text x="447" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="447" dy="0">代价</tspan></text><text x="447" y="531" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#334155" font-weight="500"><tspan x="447" dy="0">• 链路更长，对执行底座的要求更高。</tspan></text><rect x="790" y="447" width="418" height="177" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/><rect x="806" y="461" width="80" height="24" rx="12" fill="#EEF2FF" stroke="#E2E8F0"/><text x="820" y="477" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="10" fill="#4F46E5" font-weight="700">AUTO</text><text x="806" y="501" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" fill="#0F172A" font-weight="700"><tspan x="806" dy="0"></tspan></text></svg>